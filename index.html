<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate NFL Mock Draft Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .prospect-row:hover { background: rgba(56, 189, 248, 0.1); transition: 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .on-the-clock { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="glass px-6 py-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-sky-500 p-2 rounded-lg"><i data-lucide="layout-dashboard"></i></div>
            <h1 class="text-xl font-bold tracking-tight">MOCK DRAFT <span class="text-sky-400">PRO</span></h1>
        </div>
        <div id="draft-status" class="flex gap-8 text-sm font-medium">
            <div>ROUND <span id="current-round" class="text-sky-400 text-lg ml-1">1</span></div>
            <div>PICK <span id="current-pick-num" class="text-sky-400 text-lg ml-1">1</span></div>
            <div class="flex items-center gap-2">
                <span class="text-gray-400">ON THE CLOCK:</span>
                <span id="otc-team" class="text-white font-bold text-lg">TENNESSEE TITANS</span>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="resetDraft()" class="px-4 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded-md flex items-center gap-2">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
            </button>
            <button id="sim-btn" onclick="simulateToUser()" class="px-4 py-2 text-sm bg-sky-600 hover:bg-sky-500 rounded-md font-semibold">
                Simulate to Pick
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 glass border-t-0 border-l-0 custom-scrollbar overflow-y-auto p-4 hidden lg:block">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Control Teams</h2>
            <div id="team-selector-list" class="space-y-1">
                </div>
        </aside>

        <section class="flex-1 flex flex-col p-6 overflow-hidden">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold">Big Board</h2>
                    <p class="text-gray-400 text-sm">Select the best available player for your team.</p>
                </div>
                <div class="relative w-64">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                    <input type="text" id="playerSearch" placeholder="Search prospects..." class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-sky-500">
                </div>
            </div>

            <div class="glass rounded-xl flex-1 flex flex-col overflow-hidden">
                <div class="grid grid-cols-12 gap-4 px-6 py-3 border-b border-slate-700 text-xs font-bold text-gray-500 uppercase tracking-wider">
                    <div class="col-span-1">Rank</div>
                    <div class="col-span-5">Player / School</div>
                    <div class="col-span-2 text-center">Pos</div>
                    <div class="col-span-4 text-right">Action</div>
                </div>
                <div id="prospect-list" class="flex-1 overflow-y-auto custom-scrollbar">
                    </div>
            </div>
        </section>

        <aside class="w-80 glass border-t-0 border-r-0 flex flex-col">
            <div class="p-6 border-b border-slate-700">
                <div id="otc-card" class="bg-slate-800 p-4 rounded-xl border border-sky-500/30">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-bold text-sky-400 uppercase">On the Clock</span>
                        <span id="otc-abbrev" class="text-xs font-mono text-gray-400">#1</span>
                    </div>
                    <h3 id="otc-name" class="text-lg font-bold">Tennessee Titans</h3>
                    <div class="mt-3 flex flex-wrap gap-1">
                        <span class="text-[10px] bg-slate-700 px-2 py-0.5 rounded text-gray-300">Needs: QB, EDGE, WR</span>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Draft History</h2>
                <div id="draft-history" class="space-y-4">
                    </div>
            </div>
        </aside>
    </main>

    <script>
        // --- DATA ---
        const TEAMS = [
            { id: 1, name: "Tennessee Titans", abbr: "TEN", needs: ["QB", "EDGE", "WR"], logo: "🟦" },
            { id: 2, name: "Cleveland Browns", abbr: "CLE", needs: ["QB", "OT", "RB"], logo: "🟧" },
            { id: 3, name: "New York Giants", abbr: "NYG", needs: ["QB", "G", "DT"], logo: "🟦" },
            { id: 4, name: "New England Patriots", abbr: "NE", needs: ["OL", "DL", "WR"], logo: "🟥" },
            { id: 5, name: "Jacksonville Jaguars", abbr: "JAX", needs: ["DL", "CB", "OL"], logo: "⬛" },
            { id: 6, name: "Las Vegas Raiders", abbr: "LV", needs: ["RB", "WR", "CB"], logo: "⬜" },
            { id: 7, name: "New York Jets", abbr: "NYJ", needs: ["OL", "WR", "TE"], logo: "🟩" },
            { id: 8, name: "Carolina Panthers", abbr: "CAR", needs: ["EDGE", "S", "CB"], logo: "🟦" },
            { id: 9, name: "New Orleans Saints", abbr: "NO", needs: ["QB", "CB", "OL"], logo: "🟨" },
            { id: 10, name: "Chicago Bears", abbr: "CHI", needs: ["RB", "OT", "EDGE"], logo: "🟧" },
            { id: 11, name: "San Francisco 49ers", abbr: "SF", needs: ["EDGE", "DL", "CB"], logo: "🟥" },
            { id: 12, name: "Dallas Cowboys", abbr: "DAL", needs: ["WR", "RB", "EDGE"], logo: "🟦" },
            { id: 13, name: "Miami Dolphins", abbr: "MIA", needs: ["DT", "G", "S"], logo: "🟩" },
            { id: 14, name: "Indianapolis Colts", abbr: "IND", needs: ["TE", "LB", "EDGE"], logo: "🟦" },
            { id: 15, name: "Atlanta Falcons", abbr: "ATL", needs: ["EDGE", "S", "LB"], logo: "🟥" },
            { id: 16, name: "Arizona Cardinals", abbr: "ARI", needs: ["CB", "LB", "DT"], logo: "🟥" }
        ];

        const PROSPECTS = [
            { id: 101, name: "Fernando Mendoza", school: "Indiana", pos: "QB", rank: 1 },
            { id: 102, name: "Jeremiyah Love", school: "Notre Dame", pos: "RB", rank: 2 },
            { id: 103, name: "David Bailey", school: "Texas Tech", pos: "EDGE", rank: 3 },
            { id: 104, name: "Arvell Reese", school: "Ohio State", pos: "LB", rank: 4 },
            { id: 105, name: "Caleb Downs", school: "Ohio State", pos: "S", rank: 5 },
            { id: 106, name: "Francis Mauigoa", school: "Miami", pos: "OT", rank: 6 },
            { id: 107, name: "Peter Woods", school: "Clemson", pos: "DL", rank: 7 },
            { id: 108, name: "Rueben Bain Jr.", school: "Miami", pos: "EDGE", rank: 8 },
            { id: 109, name: "Sonny Styles", school: "Ohio State", pos: "LB", rank: 9 },
            { id: 110, name: "Mansoor Delane", school: "LSU", pos: "CB", rank: 10 },
            { id: 111, name: "Spencer Fano", school: "Utah", pos: "OT", rank: 11 },
            { id: 112, name: "Ty Simpson", school: "Alabama", pos: "QB", rank: 12 },
            { id: 113, name: "Carnell Tate", school: "Ohio State", pos: "WR", rank: 13 },
            { id: 114, name: "Makai Lemon", school: "USC", pos: "WR", rank: 14 },
            { id: 115, name: "Kenyon Sadiq", school: "Oregon", pos: "TE", rank: 15 }
        ];

        // --- STATE ---
        let currentPick = 0;
        let userControlledTeams = [16]; // Default to Arizona Cardinals
        let draftHistory = [];
        let availableProspects = [...PROSPECTS].sort((a,b) => a.rank - b.rank);

        // --- FUNCTIONS ---
        function init() {
            renderTeamSelectors();
            renderProspects();
            updateOTC();
            lucide.createIcons();
        }

        function renderTeamSelectors() {
            const list = document.getElementById('team-selector-list');
            list.innerHTML = TEAMS.map(team => `
                <button onclick="toggleControl(${team.id})" class="w-full flex items-center justify-between p-2 rounded text-sm ${userControlledTeams.includes(team.id) ? 'bg-sky-500/20 text-sky-400 ring-1 ring-sky-500' : 'hover:bg-slate-800 text-gray-400'}">
                    <span>${team.logo} ${team.name}</span>
                    <i data-lucide="${userControlledTeams.includes(team.id) ? 'check' : 'circle'}" class="w-3 h-3"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function toggleControl(id) {
            if (userControlledTeams.includes(id)) {
                userControlledTeams = userControlledTeams.filter(t => t !== id);
            } else {
                userControlledTeams.push(id);
            }
            renderTeamSelectors();
        }

        function renderProspects() {
            const list = document.getElementById('prospect-list');
            const search = document.getElementById('playerSearch').value.toLowerCase();
            
            list.innerHTML = availableProspects
                .filter(p => p.name.toLowerCase().includes(search) || p.school.toLowerCase().includes(search))
                .map(p => `
                <div class="grid grid-cols-12 gap-4 px-6 py-4 border-b border-slate-800 prospect-row items-center">
                    <div class="col-span-1 font-mono text-gray-500">#${p.rank}</div>
                    <div class="col-span-5">
                        <div class="font-bold">${p.name}</div>
                        <div class="text-xs text-gray-400">${p.school}</div>
                    </div>
                    <div class="col-span-2 text-center">
                        <span class="bg-slate-700 text-[10px] px-2 py-1 rounded font-bold">${p.pos}</span>
                    </div>
                    <div class="col-span-4 text-right">
                        <button onclick="draftPlayer(${p.id})" class="bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold px-4 py-2 rounded-lg transition">DRAFT</button>
                    </div>
                </div>
            `).join('');
        }

        function draftPlayer(playerId) {
            const playerIndex = availableProspects.findIndex(p => p.id === playerId);
            const player = availableProspects.splice(playerIndex, 1)[0];
            const team = TEAMS[currentPick % TEAMS.length];

            draftHistory.unshift({ team, player, pickNum: currentPick + 1 });
            currentPick++;
            
            renderProspects();
            renderHistory();
            updateOTC();

            // Auto-sim next if not user team
            if (currentPick < TEAMS.length && !userControlledTeams.includes(TEAMS[currentPick % TEAMS.length].id)) {
                // Short delay for effect
                setTimeout(autoPick, 300);
            }
        }

        function autoPick() {
            if (currentPick >= TEAMS.length) return;
            const team = TEAMS[currentPick % TEAMS.length];
            if (userControlledTeams.includes(team.id)) return;

            // AI Logic: Find best available player that matches a team need
            let selection = availableProspects.find(p => team.needs.includes(p.pos));
            if (!selection) selection = availableProspects[0]; // BPA if no needs match

            draftPlayer(selection.id);
        }

        function simulateToUser() {
            const checkNext = () => {
                const nextTeam = TEAMS[currentPick % TEAMS.length];
                if (!userControlledTeams.includes(nextTeam.id) && currentPick < TEAMS.length) {
                    autoPick();
                    setTimeout(checkNext, 200);
                }
            };
            checkNext();
        }

        function updateOTC() {
            if (currentPick >= TEAMS.length) {
                document.getElementById('otc-team').innerText = "DRAFT COMPLETE";
                return;
            }
            const team = TEAMS[currentPick % TEAMS.length];
            document.getElementById('current-pick-num').innerText = currentPick + 1;
            document.getElementById('otc-team').innerText = team.name.toUpperCase();
            document.getElementById('otc-name').innerText = team.name;
            document.getElementById('otc-abbrev').innerText = `#${currentPick + 1}`;
            
            const card = document.getElementById('otc-card');
            if (userControlledTeams.includes(team.id)) {
                card.classList.add('border-sky-500', 'on-the-clock');
            } else {
                card.classList.remove('border-sky-500', 'on-the-clock');
            }
        }

        function renderHistory() {
            const list = document.getElementById('draft-history');
            list.innerHTML = draftHistory.map(item => `
                <div class="flex gap-4 items-start">
                    <div class="w-8 h-8 rounded bg-slate-800 flex items-center justify-center text-xs font-bold border border-slate-700">${item.team.abbr}</div>
                    <div>
                        <div class="text-sm font-bold">${item.player.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase">${item.player.pos} | ${item.player.school} | Pick ${item.pickNum}</div>
                    </div>
                </div>
            `).join('');
        }

        function resetDraft() {
            currentPick = 0;
            draftHistory = [];
            availableProspects = [...PROSPECTS].sort((a,b) => a.rank - b.rank);
            init();
        }

        document.getElementById('playerSearch').addEventListener('input', renderProspects);
        init();
    </script>
</body>
</html>
